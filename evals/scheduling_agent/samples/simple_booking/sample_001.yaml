# Simple booking request - basic happy path
name: simple_booking
description: |
  User requests a straightforward appointment booking.
  Agent should check availability, book the slot, and send confirmation.

context:
  today: "2025-02-15"
  calendar_state: []  # Empty calendar - all slots available

queries:
  - input: "Book a meeting with John Smith (john@example.com) tomorrow at 2pm for 30 minutes"
    expected:
      tool_sequence:
        - check_availability  # Should verify slot is free
        - book_appointment    # Book the meeting
        - send_confirmation   # Confirm to client
      outcome:
        appointment_booked: true
        client_name: "John Smith"
        client_email: "john@example.com"
        start_time: "2025-02-16T14:00"
        duration_minutes: 30
        confirmation_sent: true

validation:
  - type: tool_called
    tool: book_appointment
  - type: response_contains
    patterns:
      - "book"
