# Constraint conflict - requested duration doesn't fit available slots
name: constraint_conflict
description: |
  User requests a meeting duration that doesn't fit cleanly into available slots.
  Agent must recognize the conflict and propose alternatives.

context:
  today: "2025-02-15"
  calendar_state:
    # Monday is heavily booked - only scattered 30-min slots available
    - id: "apt_0001"
      client_name: "Morning Standup"
      client_email: "team@example.com"
      start: "2025-02-17T09:00"
      end: "2025-02-17T09:30"
    - id: "apt_0002"
      client_name: "Client Call"
      client_email: "client@example.com"
      start: "2025-02-17T10:00"
      end: "2025-02-17T11:30"
    - id: "apt_0003"
      client_name: "Lunch Meeting"
      client_email: "lunch@example.com"
      start: "2025-02-17T12:00"
      end: "2025-02-17T13:00"
    - id: "apt_0004"
      client_name: "Project Review"
      client_email: "project@example.com"
      start: "2025-02-17T13:30"
      end: "2025-02-17T15:00"
    - id: "apt_0005"
      client_name: "Team Sync"
      client_email: "team@example.com"
      start: "2025-02-17T15:30"
      end: "2025-02-17T16:30"
    # Available: 9:30-10:00, 11:30-12:00, 13:00-13:30, 15:00-15:30, 16:30-17:00
    # No contiguous 2-hour block exists

queries:
  - input: "I need a 2-hour meeting with the design team (design@example.com) on Monday"
    expected:
      behavior:
        - "Should check availability"
        - "Should recognize no 2-hour contiguous block exists"
        - "Should suggest alternatives: different day, split meeting, or shorter duration"
      outcome:
        recognizes_conflict: true
        proposes_alternative: true

validation:
  - type: tool_called
    tool: check_availability
  - type: response_contains
    patterns:
      - "available"
