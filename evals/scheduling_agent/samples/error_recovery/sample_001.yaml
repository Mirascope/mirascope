# Error recovery - tool fails, agent must adapt
name: error_recovery  
description: |
  Agent attempts to book but encounters an error (slot taken by concurrent booking).
  Must gracefully handle the error and suggest alternatives.

context:
  today: "2025-02-15"
  calendar_state:
    # 2pm slot will be "taken" when agent tries to book
    # Simulated by pre-booking it - agent will get conflict error
    - id: "apt_0001"
      client_name: "Concurrent Booking"
      client_email: "concurrent@example.com"
      start: "2025-02-16T14:00"
      end: "2025-02-16T14:30"
      notes: "This blocks the requested slot"

queries:
  - input: "Book a meeting with Alex (alex@example.com) tomorrow at 2pm"
    expected:
      behavior:
        - "Should attempt to book 2pm"
        - "Should receive conflict error"
        - "Should suggest alternative times instead of crashing"
      outcome:
        handles_error: true
        suggests_alternative: true

validation:
  # Agent may either hit the error OR proactively check availability
  # Both are valid - the key is suggesting alternatives
  - type: response_contains
    patterns:
      - "available"
