# Multi-party coordination - find time that works for multiple people
name: multi_party_coordination
description: |
  User needs to schedule a meeting with multiple attendees.
  Agent must check availability for all parties and find overlapping free slots.

context:
  today: "2025-02-15"
  calendar_state:
    # Alice is busy 9-11am and 2-3pm on Monday
    - id: "apt_0001"
      client_name: "Alice Johnson"
      client_email: "alice@example.com"
      start: "2025-02-17T09:00"
      end: "2025-02-17T11:00"
      notes: "Alice's morning block"
    - id: "apt_0002"
      client_name: "Alice Johnson"
      client_email: "alice@example.com"
      start: "2025-02-17T14:00"
      end: "2025-02-17T15:00"
      notes: "Alice's afternoon meeting"
    # Bob is busy 10-12pm and 3-4pm on Monday
    - id: "apt_0003"
      client_name: "Bob Smith"
      client_email: "bob@example.com"
      start: "2025-02-17T10:00"
      end: "2025-02-17T12:00"
      notes: "Bob's morning block"
    - id: "apt_0004"
      client_name: "Bob Smith"
      client_email: "bob@example.com"
      start: "2025-02-17T15:00"
      end: "2025-02-17T16:00"
      notes: "Bob's afternoon meeting"
    # Overlapping free time: 12-2pm and 4-5pm

queries:
  - input: "I need to schedule a meeting with both Alice and Bob on Monday, February 17th. When are they both free?"
    expected:
      behavior:
        - "Should check availability for the date"
        - "Should identify overlapping free slots (12-2pm, 4-5pm)"
        - "Should NOT suggest times when either is busy"
      outcome:
        identifies_overlap: true
        suggests_valid_times: true

validation:
  - type: tool_called
    tool: check_availability
  - type: response_contains
    patterns:
      - "12"
      - "available"
