# Ambiguous request - user doesn't specify exact time
name: ambiguous_request
description: |
  User makes a vague request without specifying exact time.
  Agent should either ask for clarification OR pick a reasonable slot and confirm.

context:
  today: "2025-02-15"
  calendar_state:
    # Tomorrow afternoon is partially booked
    - id: "apt_0001"
      client_name: "Existing Meeting"
      client_email: "existing@example.com"
      start: "2025-02-16T14:00"
      end: "2025-02-16T15:00"
      notes: "Blocks 2-3pm"

queries:
  - input: "Can you squeeze me in tomorrow afternoon? It's for a quick chat with Sarah (sarah@example.com)"
    expected:
      behavior:
        - "Should check availability for tomorrow afternoon"
        - "Should either suggest specific times OR ask for preference"
        - "Should identify available afternoon slots (12-2pm, 3-5pm)"
      outcome:
        handles_ambiguity: true
        suggests_or_asks: true

validation:
  - type: tool_called
    tool: check_availability
  - type: response_contains
    patterns:
      - "afternoon"
