# Invalid request - outside business hours
name: invalid_request
description: |
  User requests a time outside business hours.
  Agent should recognize this is invalid and suggest business hours instead.

context:
  today: "2025-02-15"
  calendar_state: []  # Empty calendar

queries:
  - input: "Book a meeting with night-owl@example.com at 3am tomorrow"
    expected:
      behavior:
        - "Should recognize 3am is outside business hours (9am-5pm)"
        - "Should NOT attempt to book at 3am"
        - "Should explain business hours or suggest valid times"
      outcome:
        rejects_invalid: true
        explains_constraints: true

validation:
  # Agent should recognize 3am is outside business hours and decline
  # Valid responses mention: business hours, unavailable, 9am-5pm, etc.
  - type: response_contains
    patterns:
      - "business"
