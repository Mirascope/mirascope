# Cancellation - user wants to cancel
name: cancellation
description: |
  User requests to cancel an existing appointment.
  Agent should find and cancel it, confirming the action.

context:
  today: "2025-02-15"
  calendar_state:
    - id: "apt_0001"
      client_name: "Eve Wilson"
      client_email: "eve@example.com"
      start: "2025-02-16T11:00"
      end: "2025-02-16T11:30"
      notes: "Follow-up call"
    - id: "apt_0002"
      client_name: "Frank Miller"
      client_email: "frank@example.com"
      start: "2025-02-16T14:00"
      end: "2025-02-16T15:00"

queries:
  - input: "Cancel Eve's appointment"
    expected:
      tool_sequence:
        - list_appointments  # Find Eve's appointment
        - cancel_appointment
      outcome:
        cancelled: true
        cancelled_id: "apt_0001"
      behavior:
        - "Should identify correct appointment by client name"
        - "Should NOT cancel Frank's appointment"
        - "Should confirm cancellation to user"

validation:
  - type: tool_called
    tool: cancel_appointment
  - type: response_contains
    patterns:
      - "cancel"
